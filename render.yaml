services:
  - type: web
    name: fisafi-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && npm run build:backend && npm run prisma:generate
    startCommand: npm run start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "3001"
      - key: BACKEND_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: fisafi-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://yourdomain.com
    autoDeploy: true

databases:
  - name: fisafi-db
    engine: postgres
    version: "15"
    plan: free
    region: oregon
