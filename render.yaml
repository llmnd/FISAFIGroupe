services:
  - type: web
    name: fisafi-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:backend && npm run prisma:generate && npx prisma migrate deploy
    startCommand: cd /opt/render/project && node dist/backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "3001"
      - key: BACKEND_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: fisafi-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://fisafi.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: dcs9vkwe0
      - key: CLOUDINARY_UPLOAD_PRESET
        value: fisafi
    autoDeploy: true

databases:
  - name: fisafi-db
    engine: postgres
    version: "15"
    plan: free
    region: oregon
